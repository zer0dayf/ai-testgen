name: self-test

# Smoke-tests the engine itself (no API key needed): config resolution, mode
# selection, and dry-run planning must all work without crashing.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Byte-compile
        run: python -m py_compile ai_testgen.py

      - name: Resolve config
        run: python ai_testgen.py --print-config

      - name: Dry-run (auto mode, no key → must exit 0)
        run: |
          python ai_testgen.py --mode auto --dry-run
          python ai_testgen.py --mode full --dry-run
          python ai_testgen.py            # no key → skip, exit 0
